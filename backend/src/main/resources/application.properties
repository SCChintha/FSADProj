server.port=8080

spring.application.name=antifsad-backend
spring.config.import=optional:file:.env[.properties]

# MySQL datasource (adjust username/password to your local MySQL user)
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}

#frontend URL for CORS
frontend.url=${FRONTEND_URL:https://your-frontend.onrender.com}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT security settings
app.security.jwt-secret=${JWT_SECRET:AntiFSADDevelopmentJwtSecretKeyMinimum32Bytes2026}
app.security.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
